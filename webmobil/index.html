<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental Hendri Setyawan</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <h1>Rental Hendri Setyawan </h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<body>
    <div id="search">
        <div class="title">
            <h1>Car Rental</h1>
            <p>Find the perfect car for your next adventure</p>
            <hr>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="https://64.media.tumblr.com/5a8a71e378cf7b0fadc50f05d5ceb60d/b2198e56ff413621-12/s1280x1920/c2c12a0741eaf9e954719f27d0902322cac2fd2e.jpg" alt="Car 1">
            <h3>Car 1</h3>
            <p>Pajero Sport</p>
            <span>300.000</span>
            <p>Bahan bakar bensin</p>
            <button>Memesan</button>

        </div>
        <div class="car-item">
            <img src="https://www.carscoops.com/wp-content/uploads/2023/05/Honda-Brio-Facelift-6.jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>Hondo Brio</p>
            <span>230.000</span>
            <p>Bahan bakar bensin</p>
            <button>Memesan</button>
        </div>
        <div class="car-item">
            <img src="https://1.bp.blogspot.com/-x5O-Trd78e8/U_JnhSKOlUI/AAAAAAAAEUM/qjVFqMIVlUY/s1600/gambar%2Bmobil%2Bsport%2Blamborghini%2Bterbaru.jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
            <span>200.000</span>
            <button>Memesan</button>
        </div>
        <div class="car-item">
            <img src="https://4.bp.blogspot.com/-tKkEd4VecLY/U9F_Avvpg-I/AAAAAAAADE8/M0aQA_iKDAk/s1600/koleksi+gambar+mobil+sport.jpg" alt="Car 2">
            <h3>Car 4</h3>
            <p>Lamborghini</p>
            <p>Bahan bakar bensin</p>
            <span>1000.000</span>
            <button>Memesan</button>
        </div>
    </div>
</body>

</html>
