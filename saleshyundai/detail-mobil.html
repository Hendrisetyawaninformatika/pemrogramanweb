            }

        // Variabel untuk menyimpan varian yang dipilih (khusus Staria)
        let selectedVariant = "7 Seater";

        // Ambil ID dari URL
        function getCarId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id') || 'new-creta-prime';
        }

        // Render halaman detail
        function renderDetail() {
            const carId = getCarId();
            const car = carDatabase[carId];
            
            if (!car) {
                document.getElementById('detailContainer').innerHTML = `
                    <div style="background:white; border-radius:20px; padding:2rem; text-align:center">
                        <h2>😞 Mobil tidak ditemukan</h2>
                        <a href="inventory.html" class="btn-back" style="display:inline-block; margin-top:1rem;">Kembali ke Inventory</a>
                    </div>
                `;
                return;
            }

            document.getElementById('breadcrumb-name').innerText = car.name;

            // Tentukan harga berdasarkan varian (khusus Staria)
            let currentPrice = car.price;
            if (car.variants && carId === "staria-signature") {
                currentPrice = car.variants[selectedVariant].price;
            }

            // Generate spesifikasi
            let specHtml = '';
            for (const [key, value] of Object.entries(car.specs)) {
                specHtml += `<div class="spec-item"><span class="spec-label">${key}</span><span class="spec-value">${value}</span></div>`;
            }

            // Generate fitur
            let exteriorHtml = '', interiorHtml = '', teknologiHtml = '', audioHtml = '', adasHtml = '', safetyHtml = '', kelebihanHtml = '';
            
            if (car.features?.exterior && car.features.exterior.length > 0) {
                exteriorHtml = `<div class="spec-section"><h3>✨ Eksterior</h3><div class="feature-list">${car.features.exterior.map(f => `<span class="feature-tag">${f}</span>`).join('')}</div></div>`;
            }
            
            if (car.features?.interior && car.features.interior.length > 0) {
                interiorHtml = `<div class="spec-section"><h3>🎵 Interior & Kenyamanan</h3><div class="feature-list">${car.features.interior.map(f => `<span class="feature-tag">${f}</span>`).join('')}</div></div>`;
            }
            
            if (car.features?.teknologi && car.features.teknologi.length > 0) {
                teknologiHtml = `<div class="spec-section"><h3>📱 Head Unit & Teknologi</h3><div class="feature-list">${car.features.teknologi.map(f => `<span class="feature-tag">${f}</span>`).join('')}</div></div>`;
            }
            
            if (car.features?.audio && car.features.audio.length > 0) {
                audioHtml = `<div class="spec-section"><h3>🎵 Audio System</h3><div class="feature-list">${car.features.audio.map(f => `<span class="feature-tag">${f}</span>`).join('')}</div></div>`;
            }
            
            if (car.features?.adas && car.features.adas.length > 0) {
                adasHtml = `<div class="spec-section"><h3>🛡️ Hyundai SmartSense (ADAS)</h3><div class="feature-list">${car.features.adas.map(f => `<span class="feature-tag adas">${f}</span>`).join('')}</div></div>`;
            }
            
            if (car.features?.safety && car.features.safety.length > 0) {
                safetyHtml = `<div class="spec-section"><h3>🛡️ Keselamatan</h3><div class="feature-list">${car.features.safety.map(f => `<span class="feature-tag safety">${f}</span>`).join('')}</div></div>`;
            }
            
            if (car.kelebihan && car.kelebihan.length > 0) {
                kelebihanHtml = `<div class="spec-section"><h3>⭐ Kelebihan</h3><div class="feature-list">${car.kelebihan.map(f => `<span class="feature-tag kelebihan">${f}</span>`).join('')}</div></div>`;
            }

            // Generate varian selector (khusus Staria)
            let variantHtml = '';
            if (car.variants && carId === "staria-signature") {
                variantHtml = `
                    <div class="variant-selector">
                        <span style="font-weight:600;">Pilih Varian:</span>
                        <button class="variant-btn ${selectedVariant === '7 Seater' ? 'active' : ''}" onclick="selectVariant('7 Seater')">7 Seater (Captain Seat)</button>
                        <button class="variant-btn ${selectedVariant === '9 Seater' ? 'active' : ''}" onclick="selectVariant('9 Seater')">9 Seater (2-3-4)</button>
                        <span style="font-size:0.75rem; color:#666;">${selectedVariant === '7 Seater' ? '✅ Kursi premium captain seat' : '✅ Kapasitas 9 penumpang'}</span>
                    </div>
                `;
            }

            // Nomor WhatsApp
            const waNumber = "6285950830277";
            const waMessage = `Halo HYUNDAI BATANG, saya tertarik dengan *${car.name}* (${car.year})${carId === "staria-signature" ? ` varian ${selectedVariant}` : ''} dengan harga *${currentPrice}*. Apakah masih tersedia? Saya ingin informasi lebih lanjut.`;
            const waLink = `https://wa.me/${waNumber}?text=${encodeURIComponent(waMessage)}`;
            
            const testDriveMessage = `Halo HYUNDAI BATANG, saya ingin request *Test Drive* untuk mobil *${car.name}* (${car.year})${carId === "staria-signature" ? ` varian ${selectedVariant}` : ''}. Apakah bisa dijadwalkan?`;
            const testDriveLink = `https://wa.me/${waNumber}?text=${encodeURIComponent(testDriveMessage)}`;

            document.getElementById('detailContainer').innerHTML = `
                <div class="car-gallery">
                    <div class="main-image">
                        <img src="${car.image}" alt="${car.name}" loading="lazy">
                    </div>
                </div>

                <div class="car-info">
                    <h1 class="car-title">${car.name}</h1>
                    <span class="car-year">📅 ${car.year}</span>
                    <span class="car-condition">🚗 ${car.condition}</span>
                    ${variantHtml}
                    <div class="price">${currentPrice} <small>(On The Road Batang)</small></div>
                    
                    <div class="action-buttons">
                        <a href="${waLink}" class="btn btn-wa" target="_blank">
                            💬 Beli via WhatsApp
                        </a>
                        <a href="${testDriveLink}" class="btn btn-testdrive" target="_blank">
                            🚗 Request Test Drive
                        </a>
                    </div>
                </div>

                <div class="spec-section">
                    <h3>⚙️ Spesifikasi Teknis</h3>
                    <div class="spec-grid">${specHtml}</div>
                </div>
                
                ${exteriorHtml}
                ${interiorHtml}
                ${teknologiHtml}
                ${audioHtml}
                ${adasHtml}
                ${safetyHtml}
                ${kelebihanHtml}

                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-top: 0.5rem;">
                    <a href="inventory.html" class="btn-back">← Kembali ke Koleksi Mobil</a>
                    <a href="${waLink}" target="_blank" style="background:#25D366; color:white; padding:0.6rem 1.2rem; border-radius:12px; text-decoration:none; font-size:0.8rem; font-weight:bold; display:inline-flex; align-items:center; gap:0.5rem;">
                        💬 Pesan Sekarang via WhatsApp
                    </a>
                </div>
            `;
        }

        // Fungsi untuk memilih varian (khusus Staria)
        function selectVariant(variant) {
            selectedVariant = variant;
            renderDetail();
        }

        // Menu toggle untuk mobile
        const menuToggle = document.getElementById('menuToggle');
        const nav = document.querySelector('nav');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => nav.classList.toggle('show'));
        }

        // Back to top
        window.addEventListener('scroll', () => {
            const backToTop = document.getElementById('backToTop');
            if (window.scrollY > 300) backToTop.classList.add('show');
            else backToTop.classList.remove('show');
        });
        
        document.getElementById('backToTop').addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Active link
        const currentPage = window.location.pathname.split('/').pop() || 'detail-mobil.html';
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            const linkPage = link.getAttribute('href');
            if (linkPage === currentPage) {
                link.classList.add('active');
            }
        });

        // Expose selectVariant ke global
        window.selectVariant = selectVariant;

        // Jalankan render
        renderDetail();
    </script>
